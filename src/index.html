<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Launcher</title>
    <script type="module" src="/main.js" defer></script>
  </head>

  <body>
    <main id="app-shell" class="app-shell" role="dialog" aria-label="AI command bar">
      <header class="shell-header">
        <input
          id="query-input"
          class="query-input"
          type="text"
          autocomplete="off"
          placeholder="Ask anything..."
          aria-label="Query input"
        />
      </header>

      <section id="output-panel" class="output-panel" aria-live="polite"></section>
    </main>
  </body>
</html>
